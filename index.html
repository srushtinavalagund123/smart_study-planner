{% extends 'base.html' %}

{% block content %}

<form method="POST"
      action="/upload"
      enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">
Upload Timetable Image
</label>

<input type="file"
       class="form-control"
       name="image"
       required>

</div>

<button class="btn btn-primary">
Upload
</button>

</form>

{% endblock %}
