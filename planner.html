{% extends 'base.html' %}

{% block content %}

<h4>Saved Exams</h4>

<table class="table table-bordered">

<tr>
<th>Subject</th>
<th>Date</th>
</tr>

{% for exam in exams %}

<tr>
<td>{{ exam.subject }}</td>
<td>{{ exam.exam_date }}</td>
</tr>

{% endfor %}

</table>

<h4>AI Study Plan</h4>

<pre>{{ plan }}</pre>

<a href="/chat"
   class="btn btn-success">
Chat With Planner
</a>

{% endblock %}
